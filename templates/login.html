<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-card">

    <h2>Login</h2>

    <form action="/login" method="post">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <p style="text-align:center; margin-top:15px;">
        New User?
        <a href="/register">Register</a>
    </p>

</div>

</body>
</html>
